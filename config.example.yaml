server:
  host: "0.0.0.0"
  port: 8070
  token: "change-me-to-a-secure-token"

screen:
  width: 1024
  height: 758

dirigera:
  hub_ip: "192.168.1.100"
  token: "your-dirigera-hub-token"
  devices:
    - id: "your-device-id-1"
      name: "Lamp 1"
      type: "light"
      room: "Living Room"
    - id: "your-device-id-2"
      name: "Lamp 2"
      type: "light"
      room: "Bedroom"

tfl:
  lines:
    - id: "your-line-id"
      display_name: "Your Line"
  stations:
    - naptan_id: "YOUR_NAPTAN_ID"
      display_name: "Your Station"
  refresh_interval_seconds: 60
